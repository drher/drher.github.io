<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 10px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .hole {
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, #8B4513, #654321);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
            border: 3px solid #654321;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 70%;
            background: #8B6914;
            border-radius: 50% 50% 40% 40%;
            transition: bottom 0.2s;
            cursor: pointer;
        }

        .mole.show {
            bottom: 10%;
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 25%;
            width: 15px;
            height: 15px;
            background: #000;
            border-radius: 50%;
            box-shadow: 25px 0 0 #000;
        }

        .mole::after {
            content: '';
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 15px;
            background: #D2691E;
            border-radius: 50%;
        }

        .mole.whacked {
            animation: whack 0.3s ease-out;
        }

        @keyframes whack {
            0% {
                bottom: 10%;
                transform: translateX(-50%) scale(1);
            }
            50% {
                transform: translateX(-50%) scale(0.8) rotate(10deg);
            }
            100% {
                bottom: -100%;
                transform: translateX(-50%) scale(1) rotate(0deg);
            }
        }

        .hit-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
            animation: hitPop 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes hitPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -80%) scale(1);
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .reset-btn {
            background: #ff6b6b;
            color: white;
        }

        .reset-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .game-over {
            text-align: center;
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            display: none;
        }

        .game-over.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            
            .game-container {
                padding: 15px;
                border-radius: 10px;
            }
            
            h1 {
                font-size: 1.5em;
                margin-bottom: 10px;
            }
            
            .game-info {
                padding: 10px 5px;
                margin-bottom: 15px;
            }
            
            .info-label {
                font-size: 0.75em;
            }
            
            .info-value {
                font-size: 1.4em;
            }
            
            .game-board {
                gap: 8px;
                margin-bottom: 12px;
            }
            
            button {
                padding: 10px 18px;
                font-size: 0.9em;
            }
            
            .controls {
                gap: 8px;
            }
            
            .game-over {
                font-size: 1.2em;
                margin-top: 15px;
            }
        }
        
        @media (max-width: 360px) {
            h1 {
                font-size: 1.3em;
            }
            
            .info-value {
                font-size: 1.2em;
            }
            
            .game-board {
                gap: 6px;
            }
            
            button {
                padding: 8px 14px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔨 打地鼠遊戲 🔨</h1>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">分數</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">剩餘時間</div>
                <div class="info-value" id="time">30</div>
            </div>
            <div class="info-item">
                <div class="info-label">最高分</div>
                <div class="info-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="hole" data-index="0">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="1">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="2">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="3">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="4">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="5">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="6">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="7">
                <div class="mole"></div>
            </div>
            <div class="hole" data-index="8">
                <div class="mole"></div>
            </div>
        </div>

        <div class="controls">
            <button class="start-btn" id="startBtn">開始遊戲</button>
            <button class="reset-btn" id="resetBtn">重置</button>
        </div>

        <div class="game-over" id="gameOver">
            遊戲結束！您的分數：<span id="finalScore">0</span>
        </div>
    </div>

    <script>
        // 遊戲狀態
        let score = 0;
        let timeLeft = 30;
        let highScore = localStorage.getItem('whackAMoleHighScore') || 0;
        let isPlaying = false;
        let moleTimer = null;
        let countdownTimer = null;
        let currentMole = null;
        let audioContext = null;

        // DOM 元素
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const highScoreDisplay = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const gameOver = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');

        // 初始化音頻上下文
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放打擊聲音 - 快速上升的音調
        function playWhackSound() {
            initAudioContext();
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

            osc.start(now);
            osc.stop(now + 0.1);
        }

        // 播放遊戲開始聲音 - 兩個"beep"
        function playStartSound() {
            initAudioContext();
            const now = audioContext.currentTime;
            
            // 第一個beep
            const osc1 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            osc1.connect(gain1);
            gain1.connect(audioContext.destination);
            osc1.frequency.value = 523.25; // C5
            gain1.gain.setValueAtTime(0.3, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc1.start(now);
            osc1.stop(now + 0.15);
            
            // 第二個beep
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.value = 659.25; // E5
            gain2.gain.setValueAtTime(0.3, now + 0.2);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
            osc2.start(now + 0.2);
            osc2.stop(now + 0.35);
        }

        // 播放遊戲結束聲音 - 向下的音調
        function playGameOverSound() {
            initAudioContext();
            const now = audioContext.currentTime;
            
            const frequencies = [523.25, 440, 392, 349.23]; // C5, A4, G4, F4
            frequencies.forEach((freq, index) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                const startTime = now + index * 0.1;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.08);
                osc.start(startTime);
                osc.stop(startTime + 0.08);
            });
        }

        // 播放時間壓力聲音 - 快速beep（時間少于5秒時）
        function playWarningSound() {
            initAudioContext();
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.value = 800;
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
        }

        // 初始化
        highScoreDisplay.textContent = highScore;

        // 隨機選擇一個洞
        function randomHole() {
            const index = Math.floor(Math.random() * holes.length);
            return holes[index];
        }

        // 隨機時間（地鼠出現的時間）
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // 顯示地鼠
        function popUp() {
            if (!isPlaying) return;

            const hole = randomHole();
            const mole = hole.querySelector('.mole');
            const time = randomTime(500, 1500);

            // 移除之前的地鼠
            if (currentMole) {
                currentMole.classList.remove('show');
            }

            // 顯示新地鼠
            mole.classList.add('show');
            currentMole = mole;

            // 設定地鼠消失時間
            setTimeout(() => {
                if (mole.classList.contains('show')) {
                    mole.classList.remove('show');
                }
            }, time);

            // 繼續遊戲
            moleTimer = setTimeout(popUp, time);
        }

        // 打地鼠
        function whackMole(e) {
            if (!isPlaying) return;
            
            const mole = e.target;
            if (!mole.classList.contains('show')) return;
            if (mole.classList.contains('whacked')) return;

            // 增加分數
            score++;
            scoreDisplay.textContent = score;

            // 播放打擊聲音
            playWhackSound();

            // 播放打擊動畫
            mole.classList.add('whacked');
            mole.classList.remove('show');

            // 顯示打擊效果
            showHitEffect(mole.parentElement);

            // 移除動畫類
            setTimeout(() => {
                mole.classList.remove('whacked');
            }, 300);
        }

        // 顯示打擊效果
        function showHitEffect(hole) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = '+1';
            hole.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 500);
        }

        // 倒數計時
        function startCountdown() {
            countdownTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;

                // 時間少于5秒時播放警告聲
                if (timeLeft <= 5 && timeLeft > 0) {
                    playWarningSound();
                }

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 開始遊戲
        function startGame() {
            // 重置狀態
            score = 0;
            timeLeft = 30;
            isPlaying = true;
            
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            gameOver.classList.remove('show');
            
            startBtn.disabled = true;
            startBtn.textContent = '遊戲進行中...';

            // 播放開始聲音
            playStartSound();

            // 開始遊戲
            popUp();
            startCountdown();
        }

        // 結束遊戲
        function endGame() {
            isPlaying = false;
            clearTimeout(moleTimer);
            clearInterval(countdownTimer);

            // 移除所有顯示的地鼠
            moles.forEach(mole => {
                mole.classList.remove('show');
            });

            // 播放遊戲結束聲音
            playGameOverSound();

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                localStorage.setItem('whackAMoleHighScore', highScore);
            }

            // 顯示結束畫面
            finalScoreDisplay.textContent = score;
            gameOver.classList.add('show');

            startBtn.disabled = false;
            startBtn.textContent = '再玩一次';
        }

        // 重置遊戲
        function resetGame() {
            isPlaying = false;
            clearTimeout(moleTimer);
            clearInterval(countdownTimer);

            score = 0;
            timeLeft = 30;
            
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            gameOver.classList.remove('show');

            moles.forEach(mole => {
                mole.classList.remove('show', 'whacked');
            });

            startBtn.disabled = false;
            startBtn.textContent = '開始遊戲';
        }

        // 事件監聽
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);
        moles.forEach(mole => {
            mole.addEventListener('click', whackMole);
        });
    </script>
</body>
</html>
