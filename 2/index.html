<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪吃蛇小遊戲</title>
    <style>
        :root {
            --bg: #f7efe2;
            --panel: #fffaf2;
            --line: rgba(45, 36, 26, 0.16);
            --text: #2d241a;
            --brand: #0f766e;
            --accent: #b45309;
            --danger: #b42318;
            --board-bg: #1b2a31;
            --board-grid: rgba(255, 255, 255, 0.06);
            --snake: #7dd3fc;
            --snake-head: #38bdf8;
            --food: #f97316;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 14%, rgba(15, 118, 110, 0.22), transparent 30%),
                radial-gradient(circle at 88% 18%, rgba(180, 83, 9, 0.2), transparent 30%),
                linear-gradient(135deg, var(--bg), #e9f3ff);
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .app {
            width: min(760px, 100%);
            background: rgba(255, 250, 242, 0.92);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.16);
            padding: 16px;
        }

        .head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.35rem, 4vw, 1.9rem);
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .status {
            padding: 6px 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            font-size: 0.86rem;
            background: #fff;
            color: #5a6770;
            font-weight: 700;
        }

        .status.playing {
            color: var(--brand);
            border-color: rgba(15, 118, 110, 0.4);
        }

        .status.over {
            color: var(--danger);
            border-color: rgba(180, 35, 24, 0.4);
        }

        .info {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px;
            background: #fff;
        }

        .label {
            font-size: 0.8rem;
            color: #5a6770;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .value {
            font-size: 1.35rem;
            font-weight: 900;
        }

        .board-wrap {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            background: var(--board-bg);
        }

        canvas {
            width: 100%;
            aspect-ratio: 1;
            display: block;
            background:
                linear-gradient(var(--board-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--board-grid) 1px, transparent 1px),
                var(--board-bg);
            background-size: 24px 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button {
            border: 0;
            border-radius: 10px;
            font: inherit;
            padding: 10px 14px;
            font-weight: 800;
            cursor: pointer;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--brand), #0ea5a3);
            color: #fff;
        }

        .btn-lite {
            background: #eceff1;
            color: #22303b;
        }

        .tip {
            margin-top: 10px;
            font-size: 0.86rem;
            color: #4f5b64;
            line-height: 1.5;
        }

        .mobile-pad {
            margin-top: 12px;
            display: grid;
            place-items: center;
            gap: 8px;
            user-select: none;
        }

        .pad-row {
            display: flex;
            gap: 8px;
        }

        .pad-btn {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #fff;
            font-size: 1.3rem;
            font-weight: 800;
            color: #2c3f4f;
        }

        @media (min-width: 800px) {
            .mobile-pad {
                display: none;
            }
        }

        @media (max-width: 520px) {
            .info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="head">
            <h1>貪吃蛇小遊戲</h1>
            <div id="status" class="status">待機中</div>
        </div>

        <section class="info">
            <div class="card">
                <div class="label">目前分數</div>
                <div id="score" class="value">0</div>
            </div>
            <div class="card">
                <div class="label">最高分</div>
                <div id="highScore" class="value">0</div>
            </div>
            <div class="card">
                <div class="label">速度</div>
                <div id="speed" class="value">1x</div>
            </div>
        </section>

        <div class="board-wrap">
            <canvas id="board" width="600" height="600" aria-label="snake board"></canvas>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-main" type="button">開始</button>
            <button id="pauseBtn" class="btn-lite" type="button">暫停</button>
            <button id="restartBtn" class="btn-lite" type="button">重來</button>
        </div>

        <div class="tip">
            操作方式：方向鍵或 WASD。按空白鍵可暫停/繼續。<br>
            規則：吃到食物 +1，撞牆或撞到自己就結束。
        </div>

        <div class="mobile-pad" aria-label="mobile controls">
            <div class="pad-row">
                <button class="pad-btn" data-dir="up" type="button">▲</button>
            </div>
            <div class="pad-row">
                <button class="pad-btn" data-dir="left" type="button">◀</button>
                <button class="pad-btn" data-dir="down" type="button">▼</button>
                <button class="pad-btn" data-dir="right" type="button">▶</button>
            </div>
        </div>
    </main>

    <script>
        const GRID = 20;
        const CELL = 30;
        const BASE_INTERVAL = 140;

        const board = document.getElementById('board');
        const ctx = board.getContext('2d');
        const statusEl = document.getElementById('status');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const speedEl = document.getElementById('speed');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');

        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 10, y: 10 };
        let score = 0;
        let running = false;
        let paused = false;
        let timer = null;

        const highScoreKey = 'snakeHighScore';
        let highScore = Number(localStorage.getItem(highScoreKey) || 0);
        highScoreEl.textContent = String(highScore);

        function resetState() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            paused = false;
            scoreEl.textContent = '0';
            speedEl.textContent = '1x';
            placeFood();
            render();
            setStatus('待機中', '');
        }

        function setStatus(text, mode) {
            statusEl.textContent = text;
            statusEl.classList.remove('playing', 'over');
            if (mode) {
                statusEl.classList.add(mode);
            }
        }

        function placeFood() {
            let x;
            let y;
            do {
                x = Math.floor(Math.random() * GRID);
                y = Math.floor(Math.random() * GRID);
            } while (snake.some((s) => s.x === x && s.y === y));
            food = { x, y };
        }

        function getSpeedInterval() {
            const level = Math.min(7, Math.floor(score / 4));
            const speedText = (1 + level * 0.2).toFixed(1).replace('.0', '');
            speedEl.textContent = speedText + 'x';
            return Math.max(70, BASE_INTERVAL - level * 10);
        }

        function startGame() {
            if (running && paused) {
                togglePause();
                return;
            }
            if (running) {
                return;
            }

            running = true;
            paused = false;
            setStatus('進行中', 'playing');
            clearInterval(timer);
            timer = setInterval(step, getSpeedInterval());
        }

        function restartGame() {
            clearInterval(timer);
            running = false;
            resetState();
            startGame();
        }

        function togglePause() {
            if (!running) {
                return;
            }
            paused = !paused;
            setStatus(paused ? '已暫停' : '進行中', paused ? '' : 'playing');
        }

        function updateDirection(dir) {
            const map = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };
            const d = map[dir];
            if (!d) {
                return;
            }
            // 禁止直接反向，避免瞬間撞到自己。
            if (d.x === -direction.x && d.y === -direction.y) {
                return;
            }
            nextDirection = d;
        }

        function step() {
            if (!running || paused) {
                return;
            }

            direction = nextDirection;
            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            const hitWall = newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID;
            const hitSelf = snake.some((part) => part.x === newHead.x && part.y === newHead.y);

            if (hitWall || hitSelf) {
                endGame();
                return;
            }

            snake.unshift(newHead);

            if (newHead.x === food.x && newHead.y === food.y) {
                score += 1;
                scoreEl.textContent = String(score);
                placeFood();

                const newInterval = getSpeedInterval();
                clearInterval(timer);
                timer = setInterval(step, newInterval);
            } else {
                snake.pop();
            }

            render();
        }

        function endGame() {
            running = false;
            clearInterval(timer);
            setStatus('遊戲結束', 'over');

            if (score > highScore) {
                highScore = score;
                localStorage.setItem(highScoreKey, String(highScore));
                highScoreEl.textContent = String(highScore);
            }
        }

        function drawCell(x, y, color, radius) {
            const px = x * CELL;
            const py = y * CELL;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(px + 2, py + 2, CELL - 4, CELL - 4, radius);
            ctx.fill();
        }

        function render() {
            ctx.clearRect(0, 0, board.width, board.height);

            drawCell(food.x, food.y, getComputedStyle(document.documentElement).getPropertyValue('--food').trim(), 10);

            snake.forEach((part, idx) => {
                const color = idx === 0
                    ? getComputedStyle(document.documentElement).getPropertyValue('--snake-head').trim()
                    : getComputedStyle(document.documentElement).getPropertyValue('--snake').trim();
                drawCell(part.x, part.y, color, idx === 0 ? 9 : 7);
            });
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'arrowup' || key === 'w') {
                updateDirection('up');
            } else if (key === 'arrowdown' || key === 's') {
                updateDirection('down');
            } else if (key === 'arrowleft' || key === 'a') {
                updateDirection('left');
            } else if (key === 'arrowright' || key === 'd') {
                updateDirection('right');
            } else if (key === ' ') {
                e.preventDefault();
                togglePause();
            }
        });

        document.querySelectorAll('.pad-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
                updateDirection(btn.dataset.dir);
            });
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        resetState();
    </script>
</body>
</html>
