<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程計算機（何帥 設計）</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+TC:wght@400;600;700&display=swap');

        :root {
            --bg-1: #d6e0ea;
            --bg-2: #b9c7d5;
            --panel: #23303f;
            --panel-top: #36485d;
            --display: #c7ddb8;
            --display-text: #1f2b1d;
            --display-sub: #445542;
            --key-main: #e8edf1;
            --key-main-shadow: #c8d0d7;
            --key-dark: #3f4f63;
            --key-dark-shadow: #2f3c4d;
            --key-accent: #f39c29;
            --key-accent-shadow: #c97e1f;
            --key-danger: #c74444;
            --key-danger-shadow: #973333;
            --text-dark: #1f2832;
            --text-light: #f4f8ff;
            --glow: 0 20px 50px rgba(15, 25, 38, 0.28);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            font-family: 'Noto Sans TC', sans-serif;
            color: #16212e;
            background:
                radial-gradient(circle at 10% 12%, rgba(255, 255, 255, 0.7), transparent 32%),
                radial-gradient(circle at 88% 16%, rgba(255, 255, 255, 0.45), transparent 24%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
        }

        .calculator {
            width: min(430px, 100%);
            border-radius: 28px;
            background: linear-gradient(180deg, var(--panel-top), var(--panel));
            box-shadow: var(--glow);
            border: 1px solid rgba(255, 255, 255, 0.16);
            padding: 18px;
            position: relative;
            overflow: hidden;
            animation: enter 0.65s ease-out;
        }

        .calculator::after {
            content: '';
            position: absolute;
            inset: -220px auto auto -220px;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0));
            pointer-events: none;
        }

        .brand-row {
            display: flex;
            justify-content: space-between;
            align-items: end;
            margin-bottom: 10px;
            color: var(--text-light);
            position: relative;
            z-index: 1;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 0.08em;
            font-size: 1.15rem;
        }

        .model {
            font-size: 0.82rem;
            opacity: 0.9;
            text-align: right;
            line-height: 1.35;
        }

        .display-wrap {
            position: relative;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 14px;
            background: linear-gradient(180deg, #a9bc9e, #bacdae);
            box-shadow: inset 0 3px 8px rgba(32, 49, 24, 0.32);
            border: 1px solid rgba(35, 52, 28, 0.3);
            z-index: 1;
        }

        .status-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--display-sub);
            font-size: 0.72rem;
            margin-bottom: 6px;
            min-height: 16px;
        }

        .status-left {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mode-chip {
            font-weight: 700;
            letter-spacing: 0.03em;
            border-radius: 999px;
            border: 1px solid rgba(68, 85, 66, 0.45);
            padding: 0 8px;
            line-height: 1.5;
        }

        .memory-indicator {
            font-weight: 700;
            min-width: 20px;
        }

        .expr-line,
        .result-line {
            width: 100%;
            text-align: right;
            font-family: 'Orbitron', monospace;
            color: var(--display-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .expr-line {
            min-height: 24px;
            font-size: 0.95rem;
            opacity: 0.82;
        }

        .result-line {
            min-height: 38px;
            font-size: clamp(1.4rem, 4vw, 1.85rem);
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .shift-hint {
            font-size: 0.73rem;
            color: rgba(239, 245, 255, 0.85);
            margin: 6px 2px 10px;
            min-height: 18px;
            position: relative;
            z-index: 1;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .key {
            border: none;
            border-radius: 10px;
            padding: 8px 4px;
            min-height: 46px;
            background: var(--key-main);
            box-shadow: 0 4px 0 var(--key-main-shadow);
            color: var(--text-dark);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            transition: transform 0.06s ease, box-shadow 0.06s ease, filter 0.2s ease;
            display: grid;
            place-items: center;
            line-height: 1.1;
            user-select: none;
            position: relative;
        }

        .key:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--key-main-shadow);
        }

        .key .sub {
            position: absolute;
            top: 3px;
            font-size: 0.58rem;
            font-weight: 700;
            opacity: 0.84;
            color: #1d2f4d;
        }

        .key.dark {
            background: var(--key-dark);
            box-shadow: 0 4px 0 var(--key-dark-shadow);
            color: var(--text-light);
        }

        .key.dark:active {
            box-shadow: 0 1px 0 var(--key-dark-shadow);
        }

        .key.accent {
            background: var(--key-accent);
            box-shadow: 0 4px 0 var(--key-accent-shadow);
            color: #2f1e09;
        }

        .key.accent:active {
            box-shadow: 0 1px 0 var(--key-accent-shadow);
        }

        .key.danger {
            background: var(--key-danger);
            box-shadow: 0 4px 0 var(--key-danger-shadow);
            color: #fff;
        }

        .key.danger:active {
            box-shadow: 0 1px 0 var(--key-danger-shadow);
        }

        .key.wide {
            grid-column: span 2;
        }

        .key.shift-on {
            filter: saturate(1.25) brightness(1.06);
            outline: 2px solid rgba(255, 255, 255, 0.52);
            outline-offset: -2px;
        }

        .footnote {
            margin-top: 12px;
            font-size: 0.72rem;
            text-align: center;
            color: rgba(231, 238, 250, 0.9);
            position: relative;
            z-index: 1;
        }

        @keyframes enter {
            from {
                transform: translateY(18px) scale(0.97);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 460px) {
            .calculator {
                padding: 14px;
                border-radius: 20px;
            }

            .keypad {
                gap: 6px;
            }

            .key {
                min-height: 42px;
                border-radius: 8px;
                font-size: 0.84rem;
                padding: 6px 3px;
            }

            .expr-line {
                font-size: 0.86rem;
            }

            .result-line {
                min-height: 34px;
                font-size: 1.45rem;
            }
        }
    </style>
</head>
<body>
    <main class="calculator" aria-label="工程計算機">
        <div class="brand-row">
            <div class="brand">何帥</div>
            <div class="model">SCIENTIFIC CALCULATOR</div>
        </div>

        <section class="display-wrap" aria-live="polite">
            <div class="status-line">
                <div class="status-left">
                    <span id="shiftTag"> </span>
                    <span class="memory-indicator" id="memoryTag"> </span>
                </div>
                <span class="mode-chip" id="angleMode">DEG</span>
            </div>
            <div class="expr-line" id="exprLine">0</div>
            <div class="result-line" id="resultLine">0</div>
        </section>

        <div class="shift-hint" id="shiftHint">一般模式</div>

        <section class="keypad">
            <button class="key dark" data-action="shift" id="shiftBtn"><span class="sub">2nd</span>SHIFT</button>
            <button class="key dark" data-action="toggle-angle"><span class="sub">Deg/Rad</span>DRG</button>
            <button class="key dark" data-action="open">(</button>
            <button class="key dark" data-action="close">)</button>
            <button class="key dark" data-action="store-m"><span class="sub">STO</span>M+</button>
            <button class="key dark" data-action="recall-m"><span class="sub">RCL</span>MR</button>

            <button class="key" data-action="func" data-func="sin"><span class="sub">sin⁻1</span>sin</button>
            <button class="key" data-action="func" data-func="cos"><span class="sub">cos⁻1</span>cos</button>
            <button class="key" data-action="func" data-func="tan"><span class="sub">tan⁻1</span>tan</button>
            <button class="key" data-action="func" data-func="log"><span class="sub">10ˣ</span>log</button>
            <button class="key" data-action="func" data-func="ln"><span class="sub">eˣ</span>ln</button>
            <button class="key" data-action="const" data-value="pi"><span class="sub">π</span>π</button>

            <button class="key" data-action="func" data-func="sqrt"><span class="sub">x²</span>√</button>
            <button class="key" data-action="pow"><span class="sub">x^(1/y)</span>x^y</button>
            <button class="key" data-action="const" data-value="e"><span class="sub">e</span>e</button>
            <button class="key" data-action="ans"><span class="sub">Ans</span>Ans</button>
            <button class="key danger" data-action="del">DEL</button>
            <button class="key danger" data-action="clear">AC</button>

            <button class="key" data-action="digit" data-value="7">7</button>
            <button class="key" data-action="digit" data-value="8">8</button>
            <button class="key" data-action="digit" data-value="9">9</button>
            <button class="key" data-action="operator" data-value="/">÷</button>
            <button class="key" data-action="operator" data-value="*">×</button>
            <button class="key" data-action="operator" data-value="%">mod</button>

            <button class="key" data-action="digit" data-value="4">4</button>
            <button class="key" data-action="digit" data-value="5">5</button>
            <button class="key" data-action="digit" data-value="6">6</button>
            <button class="key" data-action="operator" data-value="+">+</button>
            <button class="key" data-action="operator" data-value="-">−</button>
            <button class="key" data-action="neg">(−)</button>

            <button class="key" data-action="digit" data-value="1">1</button>
            <button class="key" data-action="digit" data-value="2">2</button>
            <button class="key" data-action="digit" data-value="3">3</button>
            <button class="key" data-action="digit" data-value="0">0</button>
            <button class="key" data-action="dot">.</button>
            <button class="key accent" data-action="equals">=</button>
        </section>

    </main>

    <script>
        const exprLine = document.getElementById('exprLine');
        const resultLine = document.getElementById('resultLine');
        const angleMode = document.getElementById('angleMode');
        const shiftBtn = document.getElementById('shiftBtn');
        const shiftTag = document.getElementById('shiftTag');
        const shiftHint = document.getElementById('shiftHint');
        const memoryTag = document.getElementById('memoryTag');

        let tokens = [];
        let shiftOn = false;
        let mode = 'DEG';
        let lastAnswer = 0;
        let memoryValue = 0;

        const functions = {
            sin: {
                normal: (x) => Math.sin(toRadians(x)),
                shift: (x) => fromRadians(Math.asin(x)),
                label: 'sin'
            },
            cos: {
                normal: (x) => Math.cos(toRadians(x)),
                shift: (x) => fromRadians(Math.acos(x)),
                label: 'cos'
            },
            tan: {
                normal: (x) => Math.tan(toRadians(x)),
                shift: (x) => fromRadians(Math.atan(x)),
                label: 'tan'
            },
            log: {
                normal: (x) => Math.log10(x),
                shift: (x) => Math.pow(10, x),
                label: 'log'
            },
            ln: {
                normal: (x) => Math.log(x),
                shift: (x) => Math.exp(x),
                label: 'ln'
            },
            sqrt: {
                normal: (x) => Math.sqrt(x),
                shift: (x) => Math.pow(x, 2),
                label: 'sqrt'
            }
        };

        const operators = {
            '+': { precedence: 1, assoc: 'L', fn: (a, b) => a + b },
            '-': { precedence: 1, assoc: 'L', fn: (a, b) => a - b },
            '*': { precedence: 2, assoc: 'L', fn: (a, b) => a * b },
            '/': { precedence: 2, assoc: 'L', fn: (a, b) => a / b },
            '%': { precedence: 2, assoc: 'L', fn: (a, b) => a % b },
            '^': { precedence: 3, assoc: 'R', fn: (a, b) => Math.pow(a, b) }
        };

        const keypad = document.querySelector('.keypad');
        keypad.addEventListener('click', (event) => {
            const key = event.target.closest('.key');
            if (!key) {
                return;
            }

            const action = key.dataset.action;
            handleAction(action, key.dataset);
            refreshDisplay();
        });

        document.addEventListener('keydown', (event) => {
            const { key } = event;

            if (/^[0-9]$/.test(key)) {
                pushDigit(key);
            } else if (key === '.') {
                pushDot();
            } else if (['+', '-', '*', '/'].includes(key)) {
                pushOperator(key);
            } else if (key === '%') {
                pushOperator('%');
            } else if (key === '^') {
                pushPow();
            } else if (key === '(') {
                pushParen('(');
            } else if (key === ')') {
                pushParen(')');
            } else if (key === 'Backspace') {
                popToken();
            } else if (key === 'Delete') {
                clearAll();
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                evaluateExpression();
            }

            refreshDisplay();
        });

        function handleAction(action, dataset) {
            switch (action) {
                case 'digit':
                    pushDigit(dataset.value);
                    break;
                case 'dot':
                    pushDot();
                    break;
                case 'operator':
                    pushOperator(dataset.value);
                    break;
                case 'pow':
                    pushPow();
                    break;
                case 'open':
                    pushParen('(');
                    break;
                case 'close':
                    pushParen(')');
                    break;
                case 'func':
                    pushFunction(dataset.func);
                    break;
                case 'const':
                    pushConstant(dataset.value);
                    break;
                case 'ans':
                    pushNumber(formatNumber(lastAnswer));
                    break;
                case 'neg':
                    pushNumber('-1');
                    pushOperator('*');
                    break;
                case 'del':
                    popToken();
                    break;
                case 'clear':
                    clearAll();
                    break;
                case 'equals':
                    evaluateExpression();
                    break;
                case 'toggle-angle':
                    toggleAngleMode();
                    break;
                case 'shift':
                    toggleShift();
                    break;
                case 'store-m':
                    storeMemory();
                    break;
                case 'recall-m':
                    recallMemory();
                    break;
                default:
                    break;
            }
        }

        function pushDigit(digit) {
            const last = tokens[tokens.length - 1];
            if (isNumberToken(last)) {
                tokens[tokens.length - 1] += digit;
            } else {
                tokens.push(digit);
            }
        }

        function pushDot() {
            const last = tokens[tokens.length - 1];
            if (isNumberToken(last) && !last.includes('.')) {
                tokens[tokens.length - 1] += '.';
            } else if (!isNumberToken(last)) {
                tokens.push('0.');
            }
        }

        function pushOperator(op) {
            if (tokens.length === 0) {
                if (op === '-') {
                    tokens.push('0');
                    tokens.push('-');
                }
                return;
            }

            const last = tokens[tokens.length - 1];
            if (isOperator(last)) {
                tokens[tokens.length - 1] = op;
            } else {
                tokens.push(op);
            }
        }

        function pushPow() {
            if (tokens.length === 0) {
                return;
            }
            const last = tokens[tokens.length - 1];
            if (!isOperator(last) && last !== '(') {
                tokens.push('^');
            }
        }

        function pushParen(paren) {
            if (paren === '(') {
                const last = tokens[tokens.length - 1];
                if (isNumberToken(last) || last === ')' || last === 'pi' || last === 'e') {
                    tokens.push('*');
                }
                tokens.push('(');
                return;
            }

            if (paren === ')') {
                const openCount = tokens.filter((t) => t === '(').length;
                const closeCount = tokens.filter((t) => t === ')').length;
                const last = tokens[tokens.length - 1];
                if (openCount > closeCount && !isOperator(last) && last !== '(') {
                    tokens.push(')');
                }
            }
        }

        function pushFunction(name) {
            const selected = functions[name];
            if (!selected) {
                return;
            }

            const fnName = shiftOn ? 'a' + name : name;
            const last = tokens[tokens.length - 1];
            if (isNumberToken(last) || last === ')' || last === 'pi' || last === 'e') {
                tokens.push('*');
            }
            tokens.push(fnName);
            tokens.push('(');

            if (shiftOn) {
                shiftOn = false;
                updateShiftUi();
            }
        }

        function pushConstant(name) {
            const last = tokens[tokens.length - 1];
            if (isNumberToken(last) || last === ')' || last === 'pi' || last === 'e') {
                tokens.push('*');
            }
            tokens.push(name);
        }

        function pushNumber(raw) {
            const last = tokens[tokens.length - 1];
            if (isNumberToken(last) || last === ')' || last === 'pi' || last === 'e') {
                tokens.push('*');
            }
            tokens.push(raw);
        }

        function popToken() {
            const last = tokens[tokens.length - 1];
            if (!last) {
                return;
            }

            if (isNumberToken(last) && last.length > 1) {
                tokens[tokens.length - 1] = last.slice(0, -1);
                return;
            }

            tokens.pop();
        }

        function clearAll() {
            tokens = [];
            resultLine.textContent = '0';
        }

        function toggleAngleMode() {
            mode = mode === 'DEG' ? 'RAD' : 'DEG';
            angleMode.textContent = mode;
        }

        function toggleShift() {
            shiftOn = !shiftOn;
            updateShiftUi();
        }

        function updateShiftUi() {
            shiftBtn.classList.toggle('shift-on', shiftOn);
            shiftTag.textContent = shiftOn ? 'SHIFT' : ' ';
            shiftHint.textContent = shiftOn
                ? 'SHIFT 啟用：sin/cos/tan 變反三角；log/ln/sqrt 變 10^x、e^x、x^2'
                : '一般模式';
        }

        function storeMemory() {
            const value = tryEvaluateCurrent();
            if (Number.isFinite(value)) {
                memoryValue += value;
                updateMemoryTag();
                resultLine.textContent = formatNumber(memoryValue);
            }
        }

        function recallMemory() {
            pushNumber(formatNumber(memoryValue));
            updateMemoryTag();
        }

        function updateMemoryTag() {
            memoryTag.textContent = memoryValue !== 0 ? 'M' : ' ';
        }

        function evaluateExpression() {
            const value = tryEvaluateCurrent();
            if (!Number.isFinite(value)) {
                resultLine.textContent = 'Math ERROR';
                return;
            }

            lastAnswer = value;
            resultLine.textContent = formatNumber(value);
            tokens = [formatNumber(value)];
        }

        function tryEvaluateCurrent() {
            if (tokens.length === 0) {
                return 0;
            }

            try {
                const rpn = toRpn(tokens);
                return evalRpn(rpn);
            } catch {
                return NaN;
            }
        }

        function toRpn(inputTokens) {
            const output = [];
            const stack = [];

            for (const token of inputTokens) {
                if (isNumberToken(token)) {
                    output.push(Number(token));
                    continue;
                }

                if (token === 'pi') {
                    output.push(Math.PI);
                    continue;
                }

                if (token === 'e') {
                    output.push(Math.E);
                    continue;
                }

                if (isFunctionToken(token)) {
                    stack.push(token);
                    continue;
                }

                if (isOperator(token)) {
                    while (stack.length > 0) {
                        const top = stack[stack.length - 1];
                        if (!isOperator(top)) {
                            break;
                        }

                        const current = operators[token];
                        const last = operators[top];

                        const shouldPop =
                            (current.assoc === 'L' && current.precedence <= last.precedence) ||
                            (current.assoc === 'R' && current.precedence < last.precedence);

                        if (!shouldPop) {
                            break;
                        }

                        output.push(stack.pop());
                    }
                    stack.push(token);
                    continue;
                }

                if (token === '(') {
                    stack.push(token);
                    continue;
                }

                if (token === ')') {
                    while (stack.length > 0 && stack[stack.length - 1] !== '(') {
                        output.push(stack.pop());
                    }

                    if (stack[stack.length - 1] === '(') {
                        stack.pop();
                    }

                    if (stack.length > 0 && isFunctionToken(stack[stack.length - 1])) {
                        output.push(stack.pop());
                    }
                }
            }

            while (stack.length > 0) {
                const token = stack.pop();
                if (token !== '(' && token !== ')') {
                    output.push(token);
                }
            }

            return output;
        }

        function evalRpn(rpnTokens) {
            const stack = [];

            for (const token of rpnTokens) {
                if (typeof token === 'number') {
                    stack.push(token);
                    continue;
                }

                if (isOperator(token)) {
                    if (stack.length < 2) {
                        throw new Error('operator fail');
                    }
                    const b = stack.pop();
                    const a = stack.pop();
                    const value = operators[token].fn(a, b);
                    if (!Number.isFinite(value)) {
                        throw new Error('non finite');
                    }
                    stack.push(value);
                    continue;
                }

                if (isFunctionToken(token)) {
                    if (stack.length < 1) {
                        throw new Error('function fail');
                    }
                    const input = stack.pop();
                    const value = runFunction(token, input);
                    if (!Number.isFinite(value)) {
                        throw new Error('non finite');
                    }
                    stack.push(value);
                }
            }

            if (stack.length !== 1) {
                throw new Error('stack not clean');
            }

            return stack[0];
        }

        function runFunction(token, value) {
            switch (token) {
                case 'sin':
                    return functions.sin.normal(value);
                case 'asin':
                    return functions.sin.shift(value);
                case 'cos':
                    return functions.cos.normal(value);
                case 'acos':
                    return functions.cos.shift(value);
                case 'tan':
                    return functions.tan.normal(value);
                case 'atan':
                    return functions.tan.shift(value);
                case 'log':
                    return functions.log.normal(value);
                case 'alog':
                    return functions.log.shift(value);
                case 'ln':
                    return functions.ln.normal(value);
                case 'aln':
                    return functions.ln.shift(value);
                case 'sqrt':
                    return functions.sqrt.normal(value);
                case 'asqrt':
                    return functions.sqrt.shift(value);
                default:
                    throw new Error('unknown function');
            }
        }

        function formatNumber(value) {
            if (!Number.isFinite(value)) {
                return 'Math ERROR';
            }

            const abs = Math.abs(value);
            if ((abs >= 1e10 || (abs > 0 && abs < 1e-9))) {
                return value.toExponential(8).replace('+', '');
            }

            const text = value.toPrecision(12);
            return Number(text).toString();
        }

        function toRadians(value) {
            return mode === 'DEG' ? (value * Math.PI) / 180 : value;
        }

        function fromRadians(value) {
            return mode === 'DEG' ? (value * 180) / Math.PI : value;
        }

        function isNumberToken(token) {
            return typeof token === 'string' && /^-?\d*\.?\d+$/.test(token);
        }

        function isOperator(token) {
            return Object.prototype.hasOwnProperty.call(operators, token);
        }

        function isFunctionToken(token) {
            return ['sin', 'asin', 'cos', 'acos', 'tan', 'atan', 'log', 'alog', 'ln', 'aln', 'sqrt', 'asqrt'].includes(token);
        }

        function renderExpression(tokensValue) {
            if (tokensValue.length === 0) {
                return '0';
            }
            return tokensValue
                .map((token) => {
                    if (token === '*') return '×';
                    if (token === '/') return '÷';
                    if (token === '%') return 'mod';
                    if (token === '^') return '^';
                    if (token === 'pi') return 'π';
                    if (token === 'asin') return 'sin⁻1';
                    if (token === 'acos') return 'cos⁻1';
                    if (token === 'atan') return 'tan⁻1';
                    if (token === 'alog') return '10^';
                    if (token === 'aln') return 'e^';
                    if (token === 'asqrt') return 'x²';
                    return token;
                })
                .join(' ');
        }

        function refreshDisplay() {
            exprLine.textContent = renderExpression(tokens);
            updateMemoryTag();
        }

        updateShiftUi();
        refreshDisplay();
    </script>
</body>
</html>
