<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>簡易記事本</title>
  <style>
    :root {
      --bg-a: #f7f4ec;
      --bg-b: #efe3c9;
      --card: #fffdf7;
      --text: #2f2a20;
      --muted: #6e6554;
      --line: #d7cdb8;
      --accent: #8e5f2f;
      --accent-2: #5f3e1d;
      --ok: #246a3e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #ffffffb3 0 18%, transparent 19%),
        radial-gradient(circle at 90% 90%, #ffffff99 0 20%, transparent 21%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 14px 40px #6b5a3f33;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #faf4e8);
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 15px;
      cursor: pointer;
      transition: transform .15s ease, filter .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .btn-open {
      background: #f0e3ca;
      border-color: #d8c2a0;
      color: #493018;
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
    }

    .btn-save:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .meta {
      margin-left: auto;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    textarea {
      width: 100%;
      min-height: 68dvh;
      border: 0;
      resize: vertical;
      outline: none;
      padding: 20px;
      font: 16px/1.65 "Consolas", "Courier New", monospace;
      color: var(--text);
      background:
        repeating-linear-gradient(
          to bottom,
          #fffefb,
          #fffefb 30px,
          #efe6d5 30px,
          #efe6d5 31px
        );
      tab-size: 2;
    }

    .status {
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      background: #fff;
    }

    .status.ok {
      color: var(--ok);
    }

    .btn-save:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="toolbar">
      <button class="btn-open" id="openBtn" type="button">從 Drive 載入</button>
      <button class="btn-save" id="saveBtn" type="button" disabled>儲存至 Drive</button>
      <span class="meta" id="fileName">目前檔案：文件.txt</span>
    </div>
    <textarea id="editor" placeholder="正在載入 Google Drive 中的 文件.txt…" spellcheck="false"></textarea>
    <div class="status" id="status">正在初始化…</div>
  </main>

  <script>
    /*
     * ★ 使用方式：
     *   1. 開啟 https://script.google.com，建立新專案，貼上下方 Apps Script 程式碼後儲存
     *   2. 點選「部署 → 新增部署」，類型選「網頁應用程式」
     *      - 執行身分：我（您的 Google 帳號）
     *      - 存取權限：所有人
     *   3. 複製部署後的 URL，填入下方 SCRIPT_URL
     *
     * ── Apps Script 程式碼（貼到 script.google.com）──────────────────────────
     *
     * const FOLDER_ID = "181DHXaslc6lOcRtz2ohfzQw864Zglppd";
     * const FILE_NAME = "文件.txt";
     *
     * function getOrCreateFile() {
     *   const folder = DriveApp.getFolderById(FOLDER_ID);
     *   const files = folder.getFilesByName(FILE_NAME);
     *   if (files.hasNext()) return files.next();
     *   return folder.createFile(FILE_NAME, "", MimeType.PLAIN_TEXT);
     * }
     *
     * function doGet(e) {
     *   const content = getOrCreateFile().getBlob().getDataAsString("UTF-8");
     *   return ContentService.createTextOutput(content)
     *     .setMimeType(ContentService.MimeType.TEXT);
     * }
     *
     * function doPost(e) {
     *   getOrCreateFile().setContent(e.postData.contents);
     *   return ContentService.createTextOutput("OK")
     *     .setMimeType(ContentService.MimeType.TEXT);
     * }
     *
     * ────────────────────────────────────────────────────────────────────────
     */

    // ★ 將 Apps Script 部署後的 URL 填入此處
    const SCRIPT_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

    const openBtn   = document.getElementById("openBtn");
    const saveBtn   = document.getElementById("saveBtn");
    const editor    = document.getElementById("editor");
    const statusBar = document.getElementById("status");

    let dirty = false;

    function setStatus(msg, ok = false) {
      statusBar.textContent = msg;
      statusBar.classList.toggle("ok", ok);
    }

    function markDirty(val) {
      dirty = val;
      saveBtn.disabled = !val;
    }

    /* ── 從 Drive 載入 ── */
    async function loadFromDrive() {
      setStatus("正在從 Google Drive 載入…");
      openBtn.disabled = true;
      try {
        const res = await fetch(SCRIPT_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        editor.value = await res.text();
        markDirty(false);
        setStatus("已載入 文件.txt", true);
      } catch (err) {
        setStatus(`載入失敗：${err.message || err}`);
      } finally {
        openBtn.disabled = false;
      }
    }

    /* ── 儲存至 Drive ── */
    async function saveToDrive() {
      setStatus("正在儲存至 Google Drive…");
      saveBtn.disabled = true;
      try {
        /* Apps Script 重定向後 fetch 可能無法讀取 CORS 回應，故用 no-cors 靜默送出 */
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          body: editor.value,
        });
        markDirty(false);
        setStatus("已儲存至 Google Drive", true);
      } catch (err) {
        setStatus(`儲存失敗：${err.message || err}`);
        saveBtn.disabled = false;
      }
    }

    openBtn.addEventListener("click", loadFromDrive);
    saveBtn.addEventListener("click", saveToDrive);

    editor.addEventListener("input", () => markDirty(true));

    window.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
        e.preventDefault();
        if (dirty) saveToDrive();
      }
    });

    /* 頁面開啟後自動載入 */
    loadFromDrive();
  </script>
</body>
</html>
