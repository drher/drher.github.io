<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端記事本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: '微軟正黑體', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .status {
            font-size: 14px;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.unsaved {
            background: #fbbf24;
            animation: pulse-warn 1s infinite;
        }
        
        .status-indicator.error {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes pulse-warn {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .filename {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }
        
        .editor {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .editor:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-top: 1px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 0 0 12px 12px;
        }
        
        .info-text {
            font-size: 13px;
            color: #666;
        }
        
        .save-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .save-btn:active {
            transform: translateY(0);
        }
        
        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☁️ 雲端記事本</h1>
            <div class="header-info">
                <div class="status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">已就緒</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="editor-wrapper">
                <div class="filename">📄 記事本.txt</div>
                <textarea id="editor" class="editor" placeholder="開始輸入您的筆記..."></textarea>
            </div>
        </div>
        
        <div class="footer">
            <div>
                <div class="info-text" id="infoText">載入中...</div>
                <div class="loading" id="loadingText">正在保存...</div>
            </div>
            <button class="save-btn" id="saveBtn" onclick="saveNote()">💾 Save</button>
        </div>
    </div>

    <script>
        // 設定 GAS 部署網址（您需要替換為實際部署的網址）
        const GAS_DEPLOYMENT_URL = 'https://script.google.com/macros/s/AKfycbyFQHpqQWpLDoc77DeI_nLT_9preAL2PiqA7_Izs3eLCYD4reXxMNru23w5U703dp5-FA/exec';
        
        const editor = document.getElementById('editor');
        const saveBtn = document.getElementById('saveBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const infoText = document.getElementById('infoText');
        const loadingText = document.getElementById('loadingText');
        
        let isModified = false;
        let isLoading = false;
        
        // 監聽編輯內容變更
        editor.addEventListener('input', () => {
            isModified = true;
            updateStatus('unsaved', '未保存');
        });
        
        // 初始化：載入記事本.txt 內容
        async function initializeNote() {
            try {
                updateStatus('loading', '載入中...');
                const result = await callGAS('readFile', { filename: '記事本.txt' });
                
                if (result.success) {
                    editor.value = result.content || '';
                    isModified = false;
                    updateStatus('saved', '已就緒');
                    
                    if (result.lastModified) {
                        infoText.textContent = '最後修改時間：' + new Date(result.lastModified).toLocaleString('zh-TW');
                    } else {
                        infoText.textContent = '✨ 已自動創建新檔案';
                    }
                } else {
                    throw new Error(result.message || '載入失敗');
                }
            } catch (error) {
                console.error('初始化失敗:', error);
                updateStatus('error', '載入失敗');
                infoText.textContent = '❌ ' + error.message;
            }
        }
        
        // 保存筆記
        async function saveNote() {
            if (!isModified) {
                statusText.textContent = '沒有變更';
                return;
            }
            
            try {
                saveBtn.disabled = true;
                updateStatus('loading', '保存中...');
                loadingText.classList.add('show');
                
                const result = await callGAS('writeFile', {
                    filename: '記事本.txt',
                    content: editor.value
                });
                
                if (result.success) {
                    isModified = false;
                    updateStatus('saved', '已保存');
                    infoText.textContent = '最後修改時間：' + new Date().toLocaleString('zh-TW');
                    loadingText.classList.remove('show');
                    
                    // 3秒後恢復就緒狀態
                    setTimeout(() => {
                        if (!isModified) {
                            updateStatus('saved', '已就緒');
                        }
                    }, 3000);
                } else {
                    throw new Error(result.message || '保存失敗');
                }
            } catch (error) {
                console.error('保存失敗:', error);
                updateStatus('error', '保存失敗');
                infoText.textContent = '錯誤：' + error.message;
                loadingText.classList.remove('show');
            } finally {
                saveBtn.disabled = false;
            }
        }
        
        // 調用 GAS 函數
        async function callGAS(functionName, params = {}) {
            if (!GAS_DEPLOYMENT_URL || GAS_DEPLOYMENT_URL === 'YOUR_GAS_DEPLOYMENT_URL_HERE') {
                throw new Error('尚未設定 GAS 部署網址');
            }
            
            try {
                const url = new URL(GAS_DEPLOYMENT_URL);
                url.searchParams.append('action', functionName);
                Object.keys(params).forEach(key => {
                    url.searchParams.append(key, params[key]);
                });
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'no-cors'
                });
                
                // 因為使用 no-cors，無法直接讀取響應
                // 需要在 GAS 部署時設定 CORS 並使用適當的內容類型
                // 或者使用 POST 方法並在前端等待響應
                
                // 替代方案：使用 POST 方法
                const formData = new FormData();
                formData.append('action', functionName);
                Object.keys(params).forEach(key => {
                    formData.append(key, params[key]);
                });
                
                const resp = await fetch(GAS_DEPLOYMENT_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await resp.json();
                return result;
            } catch (error) {
                console.error('GAS 調用失敗:', error);
                throw error;
            }
        }
        
        // 更新狀態指示器
        function updateStatus(status, text) {
            statusText.textContent = text;
            statusIndicator.className = 'status-indicator';
            
            if (status === 'saved') {
                statusIndicator.classList.remove('unsaved', 'error');
            } else if (status === 'unsaved') {
                statusIndicator.classList.add('unsaved');
            } else if (status === 'error') {
                statusIndicator.classList.add('error');
            } else if (status === 'loading') {
                statusIndicator.classList.remove('unsaved', 'error');
            }
        }
        
        // 快速鍵支持
        document.addEventListener('keydown', (e) => {
            // Ctrl+S 或 Cmd+S 保存
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveNote();
            }
        });
        
        // 頁面載入時初始化
        window.addEventListener('load', initializeNote);
    </script>
</body>
</html>
