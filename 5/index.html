<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ntfy 聊天對話窗</title>
  <style>
    :root {
      --bg: #f2f5f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --line: #d8e1ea;
      --left: #eef2f7;
      --right: #0f766e;
      --right-text: #ffffff;
      --accent: #0ea5a3;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, #dff7f5 0%, transparent 40%),
        radial-gradient(circle at 80% 10%, #eaf1ff 0%, transparent 35%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .chat-app {
      width: min(900px, 100%);
      height: min(85vh, 760px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .topbar {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fcff 100%);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .topic-input,
    .msg-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      outline: none;
      font-size: 15px;
      transition: border-color 0.15s ease;
    }

    .topic-input:focus,
    .msg-input:focus {
      border-color: var(--accent);
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.15s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-connect {
      background: #0f766e;
      color: #fff;
      font-weight: 700;
    }

    .btn-send {
      background: #0ea5a3;
      color: #fff;
      font-weight: 700;
      min-width: 90px;
    }

    .btn:hover {
      filter: brightness(1.05);
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .status.connected {
      color: #047857;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .messages {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, #f9fcff 0%, #f4f8fb 100%);
    }

    .message {
      max-width: min(72ch, 80%);
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      animation: rise 0.18s ease;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.05);
    }

    .message.left {
      align-self: flex-start;
      background: var(--left);
      border-top-left-radius: 4px;
    }

    .message.right {
      align-self: flex-end;
      background: var(--right);
      color: var(--right-text);
      border-top-right-radius: 4px;
    }

    .meta {
      margin-top: 5px;
      font-size: 11px;
      opacity: 0.75;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: #fff;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      .chat-app {
        height: 92vh;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .btn-connect {
        width: 100%;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .btn-send {
        width: 100%;
      }

      .message {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <main class="chat-app" aria-label="聊天對話窗">
    <section class="topbar">
      <div class="controls">
        <input id="topicInput" class="topic-input" type="text" value="drher" placeholder="輸入 Topic，例如 drher" />
        <input id="usernameInput" class="topic-input" type="text" value="何帥" placeholder="使用者名稱" style="max-width:120px" />
        <button id="connectBtn" class="btn btn-connect" type="button">連線 / 訂閱</button>
        <span id="status" class="status" role="status" aria-live="polite">未連線</span>
      </div>
    </section>

    <section id="messages" class="messages" aria-label="聊天訊息視窗"></section>

    <section class="composer">
      <input id="messageInput" class="msg-input" type="text" placeholder="輸入訊息後按 Enter 送出" autocomplete="off" />
      <button id="sendBtn" class="btn btn-send" type="button">送出</button>
    </section>
  </main>

  <script>
    const topicInput = document.getElementById("topicInput");
    const usernameInput = document.getElementById("usernameInput");
    const connectBtn = document.getElementById("connectBtn");
    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    let eventSource = null;
    let currentTopic = "drher";

    function setStatus(text, mode = "") {
      statusEl.textContent = text;
      statusEl.className = "status";
      if (mode) statusEl.classList.add(mode);
    }

    function addMessage(text, side, meta = "") {
      const item = document.createElement("article");
      item.className = `message ${side}`;
      item.textContent = text;

      if (meta) {
        const metaEl = document.createElement("div");
        metaEl.className = "meta";
        metaEl.textContent = meta;
        item.appendChild(metaEl);
      }

      messagesEl.appendChild(item);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function parseNtfyEvent(rawData) {
      try {
        return JSON.parse(rawData);
      } catch {
        return null;
      }
    }

    function subscribeTopic() {
      const topic = topicInput.value.trim() || "drher";
      currentTopic = topic;

      if (eventSource) {
        eventSource.close();
      }

      const url = `https://ntfy.sh/${encodeURIComponent(topic)}/sse`;
      setStatus("連線中...");
      addMessage(`正在訂閱 Topic：${topic}`, "left", "系統");

      eventSource = new EventSource(url);

      eventSource.onopen = () => {
        setStatus("已連線", "connected");
      };

      eventSource.onerror = () => {
        setStatus("連線異常，將嘗試維持訂閱", "error");
      };

      eventSource.onmessage = (evt) => {
        const data = parseNtfyEvent(evt.data);
        if (!data) return;
        if (data.event !== "message") return;

        const text = data.message || "(空訊息)";
        const ts = data.time ? new Date(data.time * 1000).toLocaleTimeString() : "";
        addMessage(text, "left", ts || topic);
      };
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      if (!eventSource) {
        setStatus("請先連線 / 訂閱", "error");
        return;
      }

      const url = `https://ntfy.sh/${encodeURIComponent(currentTopic)}`;
      const now = new Date().toLocaleTimeString();
      const username = usernameInput.value.trim() || "匿名";
      const body = `${username}: ${text}`;

      try {
        const resp = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain; charset=utf-8"
          },
          body
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        addMessage(body, "right", now);
        messageInput.value = "";
        messageInput.focus();
      } catch (err) {
        setStatus(`送出失敗：${err.message}`, "error");
      }
    }

    connectBtn.addEventListener("click", subscribeTopic);
    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", (evt) => {
      if (evt.key === "Enter") {
        evt.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
